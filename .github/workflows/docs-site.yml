name: Deploy Docs.Site

on:
  push:
    branches: [main]
    paths: ['Docs.Site/**', '.github/workflows/docs-site.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./Docs.Site/package-lock.json
      - name: Install dependencies
        working-directory: ./Docs.Site
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: ./Docs.Site
        run: npx playwright install --with-deps chromium
      - name: Debug content files
        working-directory: ./Docs.Site
        run: |
          echo "=== designing-with-types .md files ==="
          find src/content/docs/samples/designing-with-types -name "*.md" | sort
          echo ""
          echo "=== file permissions ==="
          ls -la src/content/docs/samples/designing-with-types/domain/
          echo ""
          echo "=== frontmatter check ==="
          head -5 src/content/docs/samples/designing-with-types/domain/01-type-design-decisions.md
          echo ""
          echo "=== BOM check ==="
          xxd src/content/docs/samples/designing-with-types/domain/01-type-design-decisions.md | head -2
          echo ""
          echo "=== all .md files count in content/docs ==="
          find src/content/docs -name "*.md" -o -name "*.mdx" | wc -l
      - name: Build
        working-directory: ./Docs.Site
        run: npx astro build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./Docs.Site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
